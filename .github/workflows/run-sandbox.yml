name: 运行 test.py 并提供文件下载
on: workflow_dispatch  # 仅手动触发
jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # 5分钟超时
    steps:
      # 步骤1：拉取仓库代码（必加，否则找不到test.py）
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 步骤2：指定Python 3.12版本（可选，但确保版本一致）
      - name: 设置Python 3.12环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 步骤3：运行test.py，生成output.txt
      - name: 执行test.py脚本
        run: python test.py

      # 步骤4：上传output.txt供下载（核心步骤）
      - name: 上传文件供下载
        uses: actions/upload-artifact@v4
        with:
          name: test-output-files  # 下载时显示的文件包名称
          path: output.bin         # 要上传的文件（test.py生成的）
          retention-days: 1        # 文件保存1天
